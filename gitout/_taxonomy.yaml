# /gitout domain 词表 — 防止 LLM 跨轮命名漂移
# 新建 domain 时 SKILL Step 2.5 强制 append 此文件
# 字段：
#   name     — kebab-case 目录名（唯一）
#   cn       — 中文显示名
#   aliases  — 触发别名（小写、英文/拼音都行），Step 2.5 查表用
#   desc     — 一句话简介

domains:
  - name: cli-wrap
    cn: CLI 包装
    aliases: [cli, command-line, shell, terminal, agent-cli, llm-cli]
    desc: 让 AI 调命令行，或把任意软件包装成 Agent 接口

  - name: voice-pipeline
    cn: 语音 pipeline
    aliases: [voice, tts, asr, audio, audio-stream, speech, voice-agent, conversation-ai]
    desc: 跟 AI 实时语音对话的底座

  - name: claude-skills
    cn: Claude Code 生态
    aliases: [claude-code, claude, anthropic, skill, hooks, subagent]
    desc: Claude Code skill / hook / subagent 入门资源

  - name: im-export
    cn: 聊天记录导出
    aliases: [chat-export, wechat, imessage, discord, telegram, message-archive]
    desc: 微信 / iMessage / Discord 历史导出与归档

  - name: personal-kb
    cn: 个人知识库
    aliases: [knowledge-base, pkm, notes, wiki, obsidian-like, markdown-wiki]
    desc: 本地优先的 Markdown 笔记 + 互链 + 可发布

  - name: ai-avatar
    cn: AI 虚拟角色
    aliases: [vtuber, avatar, live2d, vrm, persona, character]
    desc: 给 AI 套个皮：能动嘴、有表情、能聊天的形象

  - name: server-ops
    cn: 服务器管理面板
    aliases: [server-panel, vps, admin-panel, ops, sysadmin, control-panel]
    desc: Web 面板鼠标点点搞定服务器

  - name: iot-platform
    cn: 物联网平台
    aliases: [iot, mqtt, thingsboard, device-management, smart-home-backend]
    desc: MQTT + 规则引擎 + Dashboard 完整 IoT 后台

  - name: personal-site
    cn: 个人网站全栈模板
    aliases: [portfolio, blog, digital-garden, personal-website, starter]
    desc: 博客 + 项目展示 + Now 页一个 starter 搞定

  - name: dev-productivity
    cn: 开发者生产力
    aliases: [productivity, dev-tools, developer-experience]
    desc: 提升开发效率的工具集合（多子域）
    subdomains:
      - name: claude-workflow
        cn: Claude Code 工作流工程化
        aliases: [claude-harness, skill-factory, hook-sdk]
        desc: skill 工厂 / hook SDK / 自学习 harness
      - name: ai-coding-agent
        cn: AI Coding Agent 框架
        aliases: [coding-agent, autonomous-agent, swe-agent, code-assistant]
        desc: Claude Code 之外的自主代码代理参考
      - name: ide-augment
        cn: IDE 增强
        aliases: [ide, vscode, neovim, jetbrains, editor-ai, copilot-alt]
        desc: VSCode / Neovim 里的 AI 编程插件
      - name: personal-tools
        cn: 开发者生产力工具（非 AI）
        aliases: [terminal, dotfiles, cli-tools, tui]
        desc: 不带 AI 也能让你 10x 的工具

  - name: xiaozhi-ai
    cn: xiaozhi 语音对话硬件
    aliases: [xiaozhi, esp32-voice, ai-speaker, esp32-llm]
    desc: ESP32 + LLM 端侧 AI 语音盒子生态

  - name: personality-test
    cn: 性格/心理测试
    aliases: [mbti, personality, quiz, psychology, 16-personalities, big-five, enneagram]
    desc: MBTI / 大五 / 九型等心理测试的开源实现（webapp / 小程序 / 题库）

  - name: git-self-host
    cn: 自建 Git 仓库 / 依赖代理
    aliases: [git-server, self-hosted-git, gitea, forgejo, gogs, soft-serve, git-mirror, go-proxy, dependency-cache, git-push-deploy, paas]
    desc: 自建 Git 服务器（依赖镜像 + 网站 push 部署），4C4G 级别 VPS 友好

  - name: company-website
    cn: 公司展示站模板
    aliases: [company-site, corporate-website, business-website, marketing-site, landing-page, saas-landing, brand-site]
    desc: Next.js/Nuxt + Tailwind + 移动端响应式 + 可程序化管理内容的公司官网脚手架（不同于 personal-site：偏 brand/product/CTA/SEO，非博客/portfolio 性质）

  - name: local-llm-runtime
    cn: Mac 本地 LLM 推理运行时
    aliases: [local-llm, mlx, llamafile, apple-silicon, mac-llm, local-inference, swift-llm]
    desc: Mac/Apple Silicon 本地跑 7B-30B 模型的反共识方案，不收 Ollama 本体

  - name: rag-engine
    cn: 本地优先的 RAG / 向量检索引擎
    aliases: [rag, vector-db, embedding, retrieval, hybrid-search, vector-store, graph-rag]
    desc: 嵌入式 / 自托管 / 浏览器原生的向量库，个人知识库底座

  - name: knowledge-graph
    cn: 文本/笔记→知识图谱 抽取与可视化栈
    aliases: [knowledge-graph, graphrag, entity-extraction, neo4j, kg, graph-db]
    desc: LLM 自动抽实体关系，生成可查询 / 可可视化的图结构

  - name: mcp-servers
    cn: MCP server 生态合集
    aliases: [mcp, model-context-protocol, tool-server, function-calling, mcp-server]
    desc: 给 Claude/Codex/Cursor 扩展工具能力的 MCP server 实现

  - name: screen-vision-assistant
    cn: Mac 屏幕 OCR / 截图理解 / 视觉助手
    aliases: [screen-ocr, screenshot, ocr, screen-vision, desktop-vision, text-grabber, screen-watcher]
    desc: Mac 桌面 OCR + 截图多模态 + 本地 VLM 屏幕记忆

  - name: claude-code-launcher
    cn: Claude Code 启动器 / 多账号切换器 / 一键安装包
    aliases: [cc-switch, claude-code-installer, cc-launcher, claude-code-cli-setup, claude-code-windows, provider-switcher, multi-profile-launcher]
    desc: Windows / 跨平台 Claude Code installer 与 cc-switch 类多 provider 切换工具
