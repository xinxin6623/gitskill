  - "git tui"
  - "terminal multiplexer"
  - "command launcher"
  - "dotfiles manager"
  - "file manager tui"
  - "shell history search"
  - "snippet manager terminal"

funnel:
  raw_candidates: ~210
  after_freshness_filter: 38   # pushedAt > 2025-05-23
  after_star_filter: 24        # stars >= 100
  after_old_friends_dropped: 22  # 移除 fzf/zoxide/starship/rg/bat/fd/tmux 类
  after_readme_review: 10
  final_picks: 5

