    reason: "pre-alpha 阶段，README 自己写 '42% complete'"
  - repo: Skxxtz/sherlock
    reason: "Hyprland/Wayland 专用，跨平台差，作者自己提示可能在其他系统出错"
  - repo: Mjoyufull/fsel
    reason: "GNU/Linux + BSD only，macOS / Windows 不支持"
  - repo: rockorager/prise
    reason: "alpha + 需 Zig 编译 + 走 daemon 模型，门槛高于受众"
  - repo: oknozor/toml-bombadil
    reason: "与 dotter 同类，dotter 更主流且 README 更完整；保留作为替代参考"
  - repo: yadm-dev/yadm
    reason: "成熟知名工具，已属于 '老朋友'，无需再写小白文档"
  - repo: ibraheemdev/modern-unix
    reason: "awesome 列表，违反硬约束"

